version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d starbot" ]
      interval: 10s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5
    restart: unless-stopped

  ai-service:
    image: ragoutlook-ai-service:test
    build:
      context: .
      dockerfile: Dockerfile.ai-service
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1" ]
      interval: 10s
      retries: 6
    restart: unless-stopped

  api:
    image: ragoutlook-api:test
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: starbot
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      redis:
        condition: service_started
      ai-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/api/v1/health')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 8
    restart: unless-stopped

  worker:
    image: ragoutlook-worker:test
    command: [ "celery", "-A", "app.core.celery:celery_app", "worker", "--beat", "--loglevel=info", "--pool=solo" ]
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ragoutlook-web:test
    build:
      # Context = RAG-FRONTEND/frontend/ (separate repo)
      # Dockerfile.web lives there alongside the source code
      context: ../../RAG-FRONTEND/frontend
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1" ]
      interval: 10s
      retries: 6
    restart: unless-stopped

  migrate:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infrastructure/postgres/migrations:/migrations:ro
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        if [ "$$(psql -h postgres -U postgres -d starbot -tAc "SELECT to_regclass('public.sessions')")" = "" ]; then
          for file in /migrations/*.sql; do
            echo "Applying $$file"
            psql -h postgres -U postgres -d starbot -v ON_ERROR_STOP=1 -f "$$file"
          done
        else
          echo "Database schema already exists; skipping migrations"
        fi
    restart: "no"

volumes:
  postgres_data:
